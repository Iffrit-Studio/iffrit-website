---
layout: default
---

<section class="hero" style="background-image: url({% include relative-src.html src=page.image %})">
	<div class="inner-hero text-container">
		<div class="hero-text-container">
			<h1>{{ page.title }}</h1>
			<p class="subtext">{{ page.description }}</p>
		</div>
	</div>
	{% if page.image_credits %}
	<div class="hero-image-credits">
		<p class="image-credits">
			{{ page.image_credits }}
		</p>
	</div>
	{% endif %}
	{% if page.learn_more %}
	<div class="learn-more"><a href="#learn-more">{{ page.learn_more }}<span class="arrow">&#x25BC;</span></a></div>
	{% endif %}
</section>

{{ content }}
