# ----
# Site

title: Iffrit
url: "https://www.iffrit.com"
baseurl:
google_analytics_key: UA-145638086-1
google_maps_javascript_api_key:
disqus_shortname:

# Values for the jekyll-seo-tag gem (https://github.com/jekyll/jekyll-seo-tag)
logo: /siteicon.png
description: Iffrit Studio is a playground for unleashing creativity.
author: 
  name: The Iffrit Team
  email: hello@iffrit.com
  twitter: iffrit
social:
  name: Iffrit
  links:
    - https://www.iffrit.com

# -----
# Build

timezone: Etc/UTC

permalink: pretty

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-paginate
  - jekyll-archives

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENCE
  - .well-known/

collections:
  staff_members:
    _hide_content: true
    _icon: account_circle
  projects:
    output: true
    _icon: account_circle

paginate: 11
paginate_path: "/projects/:num/"

jekyll-archives:
  enabled: ['news']

defaults:
  -
    scope:
      path: ""
      type: "staff_members"
    values:
      _options:
        image_path:
          width: 440
          height: 440
          uploads_dir: "/images/staff_members"
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
      _options:
        image:
          width: 2000
          height: 1322
          resize_style: cover
          uploads_dir: "/images/projects"
        content:
          width: 1500
          height: 2000
          uploads_dir: "/images/projects"
  -
    scope:
      path: "contact-success.html"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "pages"
    values:
      image:
        width: 2000
        height: 1322
        resize_style: cover
      bottom_image:
        width: 2000
        height: 1322
        resize_style: cover

# -----------
# Template Content

social_icons:
  - Facebook
  - Google Plus
  - Instagram
  - LinkedIn
  - Pinterest
  - Tumblr
  - Twitter
  - YouTube
  - Email
  - RSS

_comments:
  description: Text shown when sharing on social media
  blurb: Short bio or description of this person
